name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app: api
            dockerfile: infra/docker/api.Dockerfile
          - app: web
            dockerfile: infra/docker/web.Dockerfile
          - app: ai-worker
            dockerfile: infra/docker/ai-worker.Dockerfile
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64        # Oracle Ampere is ARM
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ananta-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/ananta-${{ matrix.app }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to:   type=gha,scope=${{ matrix.app }},mode=max

  rollout:
    name: SSH to Oracle and rollout
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ananta
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            git fetch --depth=1 origin main
            git reset --hard origin/main
            echo "${{ secrets.GH_PACKAGES_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env pull
            docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env up -d --remove-orphans
            docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env exec -T api node -e "console.log('OK')"
            docker system prune -af --filter "until=72h" --volumes
