name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — lint, type-check, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version:  9.12.0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20.10.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter @ananta/db prisma generate
      - run: pnpm type-check
      - run: pnpm build
      - run: pnpm test

  python:
    name: Python — lint + type-check
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: apps/ai-worker }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check src
      - run: black --check src
      - run: mypy src --ignore-missing-imports || true   # strict mode later
      - run: pytest -q
