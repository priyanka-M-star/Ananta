# LiveKit dev config — for local development only
# In production, generate a fresh API key + secret and rotate regularly.

port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  devkey: dev-secret-change-in-prod

room:
  enabled_codecs:
    - mime: audio/opus
    - mime: video/vp8
    - mime: video/h264

logging:
  level: info
  json: false
