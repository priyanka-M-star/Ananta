# Production compose — runs on the Oracle Always-Free ARM VM (4 vCPU, 24 GB).
# Front door is Cloudflare Tunnel, not exposed ports; see infra/cloudflare/.
#
# Deploy:
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env pull
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/prod.env up -d
name: ananta-prod

services:

  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  livekit:
    image: livekit/livekit-server:latest
    restart: always
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    network_mode: host       # WebRTC needs host networking for UDP ports
    depends_on: { redis: { condition: service_healthy } }

  api:
    image: ghcr.io/${GH_OWNER}/ananta-api:${IMAGE_TAG:-latest}
    restart: always
    env_file: prod.env
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    expose: ["4000"]
    logging:
      driver: "json-file"
      options: { max-size: "20m", max-file: "5" }

  web:
    image: ghcr.io/${GH_OWNER}/ananta-web:${IMAGE_TAG:-latest}
    restart: always
    env_file: prod.env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      api: { condition: service_started }
    expose: ["3000"]

  ai-worker:
    image: ghcr.io/${GH_OWNER}/ananta-ai-worker:${IMAGE_TAG:-latest}
    restart: always
    env_file: prod.env
    environment:
      ENV: production
      HOST: 0.0.0.0
      PORT: 5000
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    expose: ["5000"]
    # ML models are heavy — keep a generous start_period
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 8s
      start_period: 90s
      retries: 5

  ai-worker-celery:
    image: ghcr.io/${GH_OWNER}/ananta-ai-worker:${IMAGE_TAG:-latest}
    restart: always
    env_file: prod.env
    command: ["celery", "-A", "src.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    depends_on:
      ai-worker: { condition: service_started }
      redis:     { condition: service_healthy }

  ai-worker-beat:
    image: ghcr.io/${GH_OWNER}/ananta-ai-worker:${IMAGE_TAG:-latest}
    restart: always
    env_file: prod.env
    command: ["celery", "-A", "src.celery_app", "beat", "--loglevel=info"]
    depends_on:
      redis: { condition: service_healthy }

  cloudflared:
    # The front door. Routes ananta.app + api.ananta.app to the right services
    # through a secure tunnel; no public ports on the VM.
    image: cloudflare/cloudflared:latest
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api: { condition: service_started }
      web: { condition: service_started }

volumes:
  postgres-data:
  redis-data:
